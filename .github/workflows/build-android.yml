name: Build Android

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Build APK (release, unsigned)
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: npx tauri android build --apk --target aarch64

      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/keystore.jks

      - name: Sign APK
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          APKSIGNER=$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner
          ZIPALIGN=$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign
          mkdir -p dist-android
          for APK in $(find src-tauri/gen/android/app/build/outputs/apk -name "*-unsigned.apk"); do
            BASE=$(basename "$APK" -unsigned.apk)
            ALIGNED="$RUNNER_TEMP/${BASE}-aligned.apk"
            SIGNED="dist-android/otoreport-${BASE}.apk"
            $ZIPALIGN -p -f 4 "$APK" "$ALIGNED"
            $APKSIGNER sign \
              --ks $RUNNER_TEMP/keystore.jks \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --ks-pass pass:"$ANDROID_STORE_PASSWORD" \
              --key-pass pass:"$ANDROID_KEY_PASSWORD" \
              --out "$SIGNED" \
              "$ALIGNED"
          done
          ls -la dist-android/

      - name: Collect unsigned APK (sin keystore)
        if: env.ANDROID_KEYSTORE_BASE64 == ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p dist-android
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -exec cp {} dist-android/ \;
          ls -la dist-android/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: otoreport-android
          path: dist-android/*

      - name: Upload to preview release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: preview
          name: Preview Build
          prerelease: true
          files: dist-android/*

      - name: Upload to tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OtoReport ${{ github.ref_name }}
          generate_release_notes: true
          files: dist-android/*
