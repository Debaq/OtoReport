name: Build Linux

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            file \
            wget

      - name: Install npm dependencies
        run: npm install

      - name: Build (AppImage + binary)
        run: npx tauri build --bundles appimage

      - name: Collect artifacts
        run: |
          mkdir -p dist-linux
          cp src-tauri/target/release/bundle/appimage/*.AppImage dist-linux/
          cp src-tauri/target/release/otoreport dist-linux/otoreport-linux-x86_64
          chmod +x dist-linux/*
          ls -la dist-linux/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: otoreport-linux
          path: dist-linux/*

      - name: Upload to preview release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: preview
          name: Preview Build
          prerelease: true
          files: dist-linux/*

      - name: Upload to tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OtoReport ${{ github.ref_name }}
          generate_release_notes: true
          files: dist-linux/*
